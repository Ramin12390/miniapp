<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SƏDD Mini Scan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .container { text-align: center; padding: 25px; background: var(--tg-theme-secondary-bg-color, #f5f5f5); border-radius: 15px; width: 85%; max-width: 400px; }
        input { padding: 12px; width: 100%; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { padding: 14px; width: 100%; border-radius: 10px; border: none; background: #2481cc; color: white; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="user-name">SƏDD Tarayıcı</h2>
        <input type="text" id="link-input" placeholder="Analiz edilecek link...">
        <button id="scan-btn">Analiz Et (Reklamlı)</button>
        <p id="result"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ADIM: AdController'ı sayfa açılır açılmaz bir kez tanımlıyoruz (Doküman kuralı)
        let AdController = null;
        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "24789" });
        }

        const btn = document.getElementById('scan-btn');
        const resultDiv = document.getElementById('result');

        btn.addEventListener('click', async () => {
            const link = document.getElementById('link-input').value;
            if(!link) { tg.showAlert("Link giriniz!"); return; }

            // SDK yüklü değilse uyarı verip analize geç
            if (!AdController) {
                console.error("Adsgram SDK bulunamadı.");
                runAnalysis(link);
                return;
            }

            resultDiv.innerText = "Reklam yükleniyor...";

            // 2. ADIM: Sadece .show() metodunu çağırıyoruz
            AdController.show().then((result) => {
                // Reklam başarıyla izlendi (reward durumu)
                runAnalysis(link);
            }).catch((result) => {
                // Reklam izlenmedi veya hata oluştu (No fill, user closed vb.)
                console.log("Reklam tamamlanmadı:", result);
                // Kullanıcıyı mağdur etmemek için yine de analizi çalıştıralım
                runAnalysis(link);
            });
        });

        function runAnalysis(link) {
            resultDiv.innerText = "🔍 Analiz ediliyor...";
            setTimeout(() => {
                const lowerLink = link.toLowerCase();
                if(lowerLink.includes("gift") || lowerLink.includes("nitro")) {
                    resultDiv.innerText = "❌ TEHLİKELİ!";
                    resultDiv.style.color = "red";
                } else {
                    resultDiv.innerText = "✅ GÜVENLİ.";
                    resultDiv.style.color = "green";
                }
            }, 1500);
        }
    </script>
</body>
</html>
