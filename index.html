<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SƏDD Mini Scan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        .container { 
            text-align: center; 
            padding: 25px; 
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 400px;
        }
        h2 { margin-bottom: 20px; color: var(--tg-theme-link-color, #2481cc); }
        input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            width: 100%; 
            margin-bottom: 15px; 
            box-sizing: border-box;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
        }
        button {
            padding: 14px 28px; 
            font-size: 16px; 
            font-weight: bold;
            border: none; 
            border-radius: 10px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            width: 100%;
        }
        #result { 
            margin-top: 20px; 
            font-weight: bold; 
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="user-name">SƏDD Tarayıcı</h2>
        <p>Analiz edilecek bağlantıyı girin:</p>
        <input type="text" id="link-input" placeholder="https://example.com">
        <button id="scan-btn">Reklam İzle ve Analiz Et</button>
        <p id="result"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = "Selam, " + tg.initDataUnsafe.user.first_name + "!";
        }

        const btn = document.getElementById('scan-btn');
        const resultDiv = document.getElementById('result');

        btn.addEventListener('click', async () => {
            const link = document.getElementById('link-input').value;
            
            if(!link) {
                tg.showAlert("Lütfen bir link girin!");
                return;
            }

            // Adsgram SDK kontrolü
            if (!window.Adsgram) {
                tg.showAlert("Reklam kütüphanesi yüklenemedi. Lütfen sayfayı yenileyin.");
                return;
            }

            resultDiv.innerText = "Reklam aranıyor...";
            resultDiv.style.color = "gray";

            // Reklam Denetleyicisi
            const AdController = window.Adsgram.init({ blockId: "24789", debug: true });

            try {
                // Reklamı Göster
                const adResult = await AdController.show();
                
                if (adResult.done) {
                    runAnalysis(link);
                }
            } catch (error) {
                console.error("Adsgram Hatası:", error);
                
                // Eğer reklam bulunamadıysa kullanıcıyı bekletmeden analiz yapalım (Test aşaması için iyi olur)
                if (error.description === "No ad to show" || error.code === "NO_FILL") {
                    tg.showAlert("Şu an uygun reklam bulunamadı, analiz devam ediyor...");
                    runAnalysis(link);
                } else {
                    resultDiv.innerText = "⚠️ Reklam hatası: " + (error.description || "Bilinmiyor");
                    resultDiv.style.color = "orange";
                    tg.showAlert("Reklam izlenemedi.");
                }
            }
        });

        function runAnalysis(link) {
            resultDiv.innerText = "🔍 Analiz ediliyor...";
            resultDiv.style.color = "gray";
            tg.HapticFeedback.impactOccurred('medium');

            setTimeout(() => {
                const lowerLink = link.toLowerCase();
                if(lowerLink.includes("gift") || lowerLink.includes("free") || lowerLink.includes("nitro")) {
                    resultDiv.innerText = "❌ TEHLİKELİ: Şüpheli bağlantı!";
                    resultDiv.style.color = "#e74c3c";
                    tg.HapticFeedback.notificationOccurred('error');
                } else {
                    resultDiv.innerText = "✅ GÜVENLİ: Temiz görünüyor.";
                    resultDiv.style.color = "#2ecc71";
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 2000);
        }
    </script>
</body>
</html>
